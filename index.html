<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>文化祭スタンプラリー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>画像コレクション</h1>
    <p>各ブースにあるqrコードを読み取って画像を集めよう‼</p>

    <!-- アイテムの一覧 -->
    <div class="item-container">
        
        <div id="human" class="item-box">
            <div class="item-image-wrapper">
                <img src="適当な画像.png" alt="画像素材" class="item-image">
            </div>
            <div class="name">画像素材</div>
        </div>

        <div id="kaba" class="item-box">
            <div class="item-image-wrapper">
                <img src="kaba.jpg" alt="かば" class="item-image">
            </div>
            <div class="name">画像素材</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

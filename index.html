<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>文化祭スタンプラリー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="school-header">
        <img src="techc.jpg" alt="学校マーク" class="school-logo">
    </div>

    <h1>画像コレクション</h1>
    <p>各ブースにあるqrコードを読み取って画像を集めよう‼</p>

    <!-- 達成率 -->
    <div class="progress-container">
        <div class="progress-text">集めたアイテム: <span id="progress-count">0</span> / 2 個</div>
        <div class="progress-bar-bg">
            <div id="progress-bar" class="progress-bar-fill"></div>
        </div>
    </div>

    <!-- アイテムの一覧 -->
    <div class="item-container">
        
        <div id="human" class="item-box">
            <div class="item-image-wrapper">
                <img src="適当な画像.png" alt="画像素材" class="item-image">
            </div>
            <div class="name">画像素材</div>
        </div>

        <div id="kaba" class="item-box">
            <div class="item-image-wrapper">
                <img src="kaba.jpg" alt="かば" class="item-image">
            </div>
            <div class="name">画像素材</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
